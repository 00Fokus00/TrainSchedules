<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Entry Details</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-clock-history"></i> Station Entry Details</h1>
        <div>
            <a th:href="@{'/station-entries/' + ${entry.id} + '/edit'}"
               class="btn btn-warning me-2">
                <i class="bi bi-pencil"></i> Edit
            </a>
            <a href="/station-entries" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table">
                <tr>
                    <th width="20%">ID:</th>
                    <td th:text="${entry.id}">1</td>
                </tr>
                <tr>
                    <th>Schedule:</th>
                    <td>
                        <span th:if="${entry.schedule != null}">
                            <a th:href="@{'/schedules/' + ${entry.schedule.id}}"
                               class="text-decoration-none">
                                <i class="bi bi-calendar-event"></i>
                                <span th:text="'Schedule #' + ${entry.schedule.id}">Schedule #1</span>
                            </a>
                        </span>
                        <span th:unless="${entry.schedule != null}" class="text-muted">
                            Not set
                        </span>
                    </td>
                </tr>
                <tr>
                    <th>Station:</th>
                    <td>
                        <span th:if="${entry.station != null}">
                            <a th:href="@{'/stations/' + ${entry.station.id}}"
                               class="text-decoration-none">
                                <i class="bi bi-geo-alt"></i>
                                <span th:text="${entry.station.name}">Station Name</span>
                            </a>
                        </span>
                        <span th:unless="${entry.station != null}" class="text-muted">
                            Not set
                        </span>
                    </td>
                </tr>
                <tr>
                    <th>Arrival Time:</th>
                    <td>
                        <span th:if="${entry.arrivalTime != null}">
                            <span th:text="${#temporals.format(entry.arrivalTime, 'yyyy-MM-dd HH:mm')}">2023-01-01 10:00</span>
                        </span>
                        <span th:unless="${entry.arrivalTime != null}" class="text-muted">
                            Not specified
                        </span>
                    </td>
                </tr>
                <tr>
                    <th>Departure Time:</th>
                    <td>
                        <span th:if="${entry.departureTime != null}">
                            <span th:text="${#temporals.format(entry.departureTime, 'yyyy-MM-dd HH:mm')}">2023-01-01 10:30</span>
                        </span>
                        <span th:unless="${entry.departureTime != null}" class="text-muted">
                            Not specified
                        </span>
                    </td>
                </tr>
                <tr>
                    <th>Segment Order:</th>
                    <td>
                        <span class="badge bg-secondary" th:text="${entry.segmentOrder}">1</span>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <!-- Delete Section -->
    <div class="card border-danger mt-4">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Danger Zone</h5>
        </div>
        <div class="card-body">
            <form th:action="@{'/station-entries/' + ${entry.id} + '/delete'}" method="post">
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('Delete this station entry permanently?')">
                    <i class="bi bi-trash"></i> Delete Station Entry
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
