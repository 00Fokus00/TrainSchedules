<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locomotive Details</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-train"></i> Locomotive Details</h1>
        <div>
            <a th:href="@{'/locomotives/' + ${locomotive.id} + '/edit'}"
               class="btn btn-warning me-2">
                <i class="bi bi-pencil"></i> Edit
            </a>
            <a href="/locomotives" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table">
                <tr>
                    <th width="20%">ID:</th>
                    <td th:text="${locomotive.id}">1</td>
                </tr>
                <tr>
                    <th>Model:</th>
                    <td th:text="${locomotive.model}">Model X</td>
                </tr>
                <tr>
                    <th>Power:</th>
                    <td>
                        <span th:text="${locomotive.power} ?: 'Not specified'">3000</span> kW
                    </td>
                </tr>
                <tr>
                    <th>Train:</th>
                    <td>
                        <span th:if="${train != null}">
                            <a th:href="@{'/trains/' + ${train.id}}"
                               class="text-decoration-none">
                                <i class="bi bi-train-front"></i>
                                <span th:text="${train.number}">T001</span>
                                <span th:if="${train.maxSpeed != null}"
                                      class="text-muted ms-2">
                                    (<span th:text="${train.maxSpeed}">120</span> km/h)
                                </span>
                            </a>
                        </span>
                        <span th:unless="${train != null}" class="text-muted">
                            Not assigned to any train
                        </span>
                    </td>
                </tr>
                <tr>
                    <th>Status:</th>
                    <td>
                        <span th:if="${locomotive.status != null}"
                              th:class="${locomotive.status == 'Active' ? 'badge bg-success' :
                                       locomotive.status == 'Inactive' ? 'badge bg-secondary' :
                                       locomotive.status == 'Maintenance' ? 'badge bg-warning' :
                                       locomotive.status == 'Repair' ? 'badge bg-danger' :
                                       'badge bg-info'}"
                              th:text="${locomotive.status}">Active</span>
                        <span th:unless="${locomotive.status != null}" class="text-muted">Not set</span>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <!-- Delete Section -->
    <div class="card border-danger mt-4">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Danger Zone</h5>
        </div>
        <div class="card-body">
            <form th:action="@{'/locomotives/' + ${locomotive.id} + '/delete'}" method="post">
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('Delete this locomotive permanently?')">
                    <i class="bi bi-trash"></i> Delete Locomotive
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
