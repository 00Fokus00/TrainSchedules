<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stations</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
    <i class="bi bi-exclamation-circle"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-geo-alt"></i> Stations</h1>
        <a href="/stations/new" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Add Station
        </a>
    </div>

    <!-- Search Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/stations}" method="get" class="row g-3 align-items-center">
                <div class="col-md-9">
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               name="search"
                               th:value="${search}"
                               placeholder="Search stations by name...">
                        <!-- Скрытые поля для сохранения сортировки при поиске -->
                        <input type="hidden" name="sortBy" th:value="${sortBy}">
                        <input type="hidden" name="direction" th:value="${direction}">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Search
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/stations}" class="btn btn-outline-secondary" th:if="${!#strings.isEmpty(search)}">
                        <i class="bi bi-x-circle"></i> Clear
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Results Info -->
    <div th:if="${totalItems > 0}" class="alert alert-info mb-3">
        <div class="row">
            <div class="col-md-6">
                Showing <strong th:text="${stations.size()}">0</strong> of <strong th:text="${totalItems}">0</strong> stations
                <span th:if="${search != null && search != ''}">for search: "<strong th:text="${search}"></strong>"</span>
            </div>
            <div class="col-md-6 text-end">
                Page <strong th:text="${currentPage + 1}">1</strong> of <strong th:text="${totalPages}">1</strong>
            </div>
        </div>
    </div>

    <div th:if="${totalItems == 0}" class="alert alert-warning mb-3">
        No stations found
        <span th:if="${search != null && search != ''}">for search: "<strong th:text="${search}"></strong>"</span>
    </div>

    <!-- Stations Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>
                            <a th:href="@{/stations(search=${search}, page=0, sortBy='id', direction=${(sortBy == 'id' and direction == 'asc') ? 'desc' : 'asc'})}"
                               class="text-decoration-none text-dark d-flex align-items-center me-2">
                                ID
                                <span th:if="${sortBy == 'id'}">
                                    <i th:class="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                                </span>
                                <span th:unless="${sortBy == 'id'}" class="text-muted">
                                    <i class="bi bi-arrow-down-up"></i>
                                </span>
                            </a>
                        </th>
                        <th>
                            <a th:href="@{/stations(search=${search}, page=0, sortBy='name', direction=${(sortBy == 'name' and direction == 'asc') ? 'desc' : 'asc'})}"
                               class="text-decoration-none text-dark d-flex align-items-center me-2">
                                Name
                                <span th:if="${sortBy == 'name'}">
                                    <i th:class="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                                </span>
                                <span th:unless="${sortBy == 'name'}" class="text-muted">
                                    <i class="bi bi-arrow-down-up"></i>
                                </span>
                            </a>
                        </th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="station : ${stations}">
                        <td th:text="${station.id}">1</td>
                        <td th:text="${station.name}">Station Name</td>
                        <td class="text-end table-actions">
                            <a th:href="@{'/stations/' + ${station.id}}"
                               class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i> View
                            </a>
                            <a th:href="@{'/stations/' + ${station.id} + '/edit'}"
                               class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <form th:action="@{'/stations/' + ${station.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete station?')">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}">
        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center">
                <!-- Previous Page -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                    <a class="page-link"
                       th:href="@{/stations(search=${search}, page=${currentPage - 1}, sortBy=${sortBy}, direction=${direction})}"
                       aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <!-- First Page -->
                <li class="page-item" th:if="${startPage > 0}">
                    <a class="page-link"
                       th:href="@{/stations(search=${search}, page=0, sortBy=${sortBy}, direction=${direction})}"
                       th:text="1">1</a>
                </li>

                <!-- Ellipsis if needed -->
                <li class="page-item disabled" th:if="${startPage > 1}">
                    <span class="page-link">...</span>
                </li>

                <!-- Page Numbers -->
                <li th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                    class="page-item"
                    th:classappend="${pageNum == currentPage} ? 'active' : ''">
                    <a class="page-link"
                       th:href="@{/stations(search=${search}, page=${pageNum}, sortBy=${sortBy}, direction=${direction})}"
                       th:text="${pageNum + 1}">1</a>
                </li>

                <!-- Ellipsis if needed -->
                <li class="page-item disabled" th:if="${endPage < totalPages - 2}">
                    <span class="page-link">...</span>
                </li>

                <!-- Last Page -->
                <li class="page-item" th:if="${endPage < totalPages - 1}">
                    <a class="page-link"
                       th:href="@{/stations(search=${search}, page=${totalPages - 1}, sortBy=${sortBy}, direction=${direction})}"
                       th:text="${totalPages}">10</a>
                </li>

                <!-- Next Page -->
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                    <a class="page-link"
                       th:href="@{/stations(search=${search}, page=${currentPage + 1}, sortBy=${sortBy}, direction=${direction})}"
                       aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
