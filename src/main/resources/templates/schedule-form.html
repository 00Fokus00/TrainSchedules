<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${schedule.id != null} ? 'Edit Schedule' : 'Create Schedule'">Create Schedule</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <h1>
        <i class="bi bi-calendar-event"></i>
        <span th:text="${schedule.id != null} ? 'Edit Schedule' : 'Create Schedule'">
            Create Schedule
        </span>
    </h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${schedule.id != null} ? @{'/schedules/' + ${schedule.id}} :
                                  '/schedules'"
                  method="post">

                <input type="hidden" th:if="${schedule.id != null}"
                       th:name="id" th:value="${schedule.id}">

                <div class="mb-3">
                    <label for="train" class="form-label">Train *</label>
                    <select class="form-select" id="train" name="train" required>
                        <option value="">-- Select Train --</option>
                        <option th:each="train : ${trains}"
                                th:value="${train.id}"
                                th:text="${train.number}"
                                th:selected="${schedule.train != null && schedule.train.id == train.id}">
                        </option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="departureTime" class="form-label">Departure Time</label>
                        <input type="datetime-local" class="form-control" id="departureTime"
                               name="departureTime" th:value="${schedule.departureTime != null ? #temporals.format(schedule.departureTime, 'yyyy-MM-dd''T''HH:mm') : ''}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="arrivalTime" class="form-label">Arrival Time</label>
                        <input type="datetime-local" class="form-control" id="arrivalTime"
                               name="arrivalTime" th:value="${schedule.arrivalTime != null ? #temporals.format(schedule.arrivalTime, 'yyyy-MM-dd''T''HH:mm') : ''}" required>
                        <div class="form-text text-danger" id="arrivalTimeError" style="display: none;">
                            Arrival time must be before departure time
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="bi bi-geo-alt"></i> Station Entries</h5>
                    </div>
                    <div class="card-body">
                        <p>Manage station stops for this schedule:</p>
                        <div class="d-flex gap-2">
                            <a th:href="@{'/station-entries?scheduleId=' + ${schedule.id}}"
                               class="btn btn-outline-info">
                                <i class="bi bi-list"></i> View All Stops
                            </a>
                            <a th:href="@{'/station-entries/new?scheduleId=' + ${schedule.id}}"
                               class="btn btn-success">
                                <i class="bi bi-plus-circle"></i> Add New Stop
                            </a>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/schedules" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary" id="submitButton">
                        <i class="bi bi-save"></i>
                        <span th:text="${schedule.id != null} ? 'Update' : 'Create'">
                            Save
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Валидация времени
    document.addEventListener('DOMContentLoaded', function() {
        const departureInput = document.getElementById('departureTime');
        const arrivalInput = document.getElementById('arrivalTime');
        const arrivalError = document.getElementById('arrivalTimeError');
        const submitButton = document.getElementById('submitButton');

        function validateTimes() {
            const departure = new Date(departureInput.value);
            const arrival = new Date(arrivalInput.value);

            if (departure && arrival && arrival >= departure) {
                arrivalError.style.display = 'block';
                submitButton.disabled = true;
                return false;
            } else {
                arrivalError.style.display = 'none';
                submitButton.disabled = false;
                return true;
            }
        }

        departureInput.addEventListener('change', validateTimes);
        arrivalInput.addEventListener('change', validateTimes);

        // Изначальная валидация
        validateTimes();
    });
</script>
</body>
</html>
