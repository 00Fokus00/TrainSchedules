<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${station.id != null} ? 'Edit Station' : 'Create Station'">Create Station</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <h1>
        <i class="bi bi-geo-alt"></i>
        <span th:text="${station.id != null} ? 'Edit Station' : 'Create Station'">
                Create Station
            </span>
    </h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${station.id != null} ? @{'/stations/' + ${station.id}} :
                                  '/stations'"
                  method="post">

                <input type="hidden" th:if="${station.id != null}"
                       th:name="id" th:value="${station.id}">

                <div class="mb-3">
                    <label for="name" class="form-label">Station Name</label>
                    <input type="text" class="form-control" id="name"
                           name="name" th:value="${station.name}" required
                           placeholder="Enter station name">
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/stations" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        <span th:text="${station.id != null} ? 'Update' : 'Create'">
                                Save
                            </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
