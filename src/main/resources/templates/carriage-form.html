<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${carriage.id != null} ? 'Edit Carriage' : 'Create Carriage'">Create Carriage</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <h1>
        <i class="bi bi-train-front"></i>
        <span th:text="${carriage.id != null} ? 'Edit Carriage' : 'Create Carriage'">
            Create Carriage
        </span>
    </h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${carriage.id != null} ? @{'/carriages/' + ${carriage.id}} :
                                  '/carriages'"
                  method="post">

                <input type="hidden" th:if="${carriage.id != null}"
                       th:name="id" th:value="${carriage.id}">

                <div class="mb-3">
                    <label for="train" class="form-label">Train</label>
                    <select class="form-select" id="train" name="train">
                        <option value="">-- Not assigned --</option>
                        <option th:each="train : ${trains}"
                                th:value="${train.id}"
                                th:text="${train.number}"
                                th:selected="${carriage.train != null && carriage.train.id == train.id}">
                        </option>
                    </select>
                </div>

<!--                <div class="mb-3">-->
<!--                    <label for="type" class="form-label">Type *</label>-->
<!--                    <input type="text" class="form-control" id="type"-->
<!--                           name="type" th:value="${carriage.type}" required-->
<!--                           placeholder="Enter carriage type (e.g., Passenger, Cargo, Sleeper)">-->
<!--                </div>-->

                <div class="mb-3">
                    <label for="type" class="form-label">Status</label>
                    <select class="form-select" id="type" name="type">
                        <option value="">-- Select Type --</option>
                        <option value="passenger" th:selected="${carriage.type == 'passenger'}">Passenger</option>
                        <option value="freight" th:selected="${carriage.type == 'freight'}">Freight</option>
                        <option value="restaurant" th:selected="${carriage.type == 'restaurant'}">Restaurant</option>
                        <option value="sleeping" th:selected="${carriage.type == 'sleeping'}">Sleeping</option>
                        <!--                        <option value="Repair" th:selected="${locomotive.status == 'Repair'}">Repair</option>-->
                        <!--                        <option value="Reserved" th:selected="${locomotive.status == 'Reserved'}">Reserved</option>-->
                    </select>
                    <div class="form-text">Optional status of the locomotive</div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="${carriage.train != null} ? @{'/trains/' + ${carriage.train.id}} : '/carriages'"
                       class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        <span th:text="${carriage.id != null} ? 'Update' : 'Create'">
                            Save
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
