<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${train.id != null} ? 'Edit Train' : 'Create Train'">Create Train</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <h1>
        <i class="bi bi-train-front"></i>
        <span th:text="${train.id != null} ? 'Edit Train' : 'Create Train'">
            Create Train
        </span>
    </h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${train.id != null} ? @{'/trains/' + ${train.id}} :
                                  '/trains'"
                  method="post">

                <input type="hidden" th:if="${train.id != null}"
                       th:name="id" th:value="${train.id}">

                <div class="mb-3">
                    <label for="number" class="form-label">Train Number *</label>
                    <input type="text" class="form-control" id="number"
                           name="number" th:value="${train.number}" required
                           placeholder="Enter train number">
                    <div class="form-text">Must be unique</div>
                </div>

                <div class="mb-3">
                    <label for="maxSpeed" class="form-label">Maximum Speed (km/h)</label>
                    <input type="number" class="form-control" id="maxSpeed"
                           name="maxSpeed" th:value="${train.maxSpeed}"
                           placeholder="Enter maximum speed" min="0">
                </div>

                <div class="mb-3">
                    <label for="locomotive" class="form-label">Locomotive</label>
                    <select class="form-select" id="locomotive" name="locomotive">
                        <option value="">-- No Locomotive --</option>
                        <option th:each="locomotive : ${locomotives}"
                                th:value="${locomotive.id}"
                                th:text="'#' + ${locomotive.id} + ' - ' + ${locomotive.model}"
                                th:selected="${train.locomotive != null && train.locomotive.id == locomotive.id}">
                        </option>
                    </select>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/trains" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        <span th:text="${train.id != null} ? 'Update' : 'Create'">
                            Save
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
