<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${locomotive.id != null} ? 'Edit Locomotive' : 'Create Locomotive'">Create Locomotive</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <h1>
        <i class="bi bi-train"></i>
        <span th:text="${locomotive.id != null} ? 'Edit Locomotive' : 'Create Locomotive'">
            Create Locomotive
        </span>
    </h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${locomotive.id != null} ? @{'/locomotives/' + ${locomotive.id}} :
                                  '/locomotives'"
                  method="post">

                <input type="hidden" th:if="${locomotive.id != null}"
                       th:name="id" th:value="${locomotive.id}">

                <div class="mb-3">
                    <label for="model" class="form-label">Model *</label>
                    <input type="text" class="form-control" id="model"
                           name="model" th:value="${locomotive.model}" required
                           placeholder="Enter locomotive model">
                </div>

                <div class="mb-3">
                    <label for="power" class="form-label">Power (kW)</label>
                    <input type="number" class="form-control" id="power"
                           name="power" th:value="${locomotive.power}"
                           placeholder="Enter power in kW" min="0">
                </div>

                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="">-- Select Status --</option>
                        <option value="active" th:selected="${locomotive.status == 'active'}">Active</option>
                        <option value="inactive" th:selected="${locomotive.status == 'inactive'}">Inactive</option>
<!--                        <option value="Repair" th:selected="${locomotive.status == 'Repair'}">Repair</option>-->
<!--                        <option value="Reserved" th:selected="${locomotive.status == 'Reserved'}">Reserved</option>-->
                    </select>
                    <div class="form-text">Optional status of the locomotive</div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/locomotives" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        <span th:text="${locomotive.id != null} ? 'Update' : 'Create'">
                            Save
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
