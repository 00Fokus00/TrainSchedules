<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Schedules</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
<div th:insert="~{fragments/navbar :: navbar}"></div>
<!-- Main Content -->
<div class="container">
    <div class="jumbotron bg-light p-5 rounded-3 mb-5">
        <h1 class="display-4"><i class="bi bi-train-front text-primary"></i> Railway Schedules System</h1>
        <p class="lead">Complete management system for railway operations</p>
        <p>Use the navigation menu to manage different entities.</p>
    </div>

    <!-- API Links -->
    <div class="card">
        <div class="card-header">
            <h5><i class="bi bi-code"></i> API Endpoints</h5>
        </div>
        <div class="card-body">
            <div class="list-group">
                <a href="/api/stations" class="list-group-item list-group-item-action">
                    <i class="bi bi-geo-alt"></i> /api/stations
                </a>
                <a href="/api/trains" class="list-group-item list-group-item-action">
                    <i class="bi bi-train-front"></i> /api/trains
                </a>
                <a href="/api/locomotives" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear"></i> /api/locomotives
                </a>
                <a href="/api/schedules" class="list-group-item list-group-item-action">
                    <i class="bi bi-calendar-event"></i> /api/schedules
                </a>
                <a href="/api/train-carriages" class="list-group-item list-group-item-action">
                    <i class="bi bi-train-lightrail-front"></i> /api/train-carriages
                </a>
                <a href="/api/station-entries" class="list-group-item list-group-item-action">
                    <i class="bi bi-list-task"></i> /api/station-entries
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-5 py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom Scripts -->
<script>
    function confirmDelete(message) {
        return confirm(message || 'Are you sure you want to delete this item?');
    }
</script>
</body>
</html>
