<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${entry.id != null} ? 'Edit Station Entry' : 'Create Station Entry'">Create Station Entry</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<div class="container flex-grow-1">
    <h1>
        <i class="bi bi-clock-history"></i>
        <span th:text="${entry.id != null} ? 'Edit Station Entry' : 'Create Station Entry'">
            Create Station Entry
        </span>
    </h1>

    <div class="card">
        <div class="card-body">
            <!-- Используем th:with для вычисления action URL -->
            <div th:with="actionUrl=${entry.id != null} ?
                         @{/station-entries/{id}(id=${entry.id})} :
                         @{/station-entries}">
                <form th:action="${actionUrl}" method="post">

                    <!-- Скрытые поля для returnTo и id -->
                    <input type="hidden" th:if="${returnTo != null}"
                           th:name="returnTo" th:value="${returnTo}">

                    <!-- Для обновления нужен ID записи -->
                    <input type="hidden" th:if="${entry.id != null}"
                           th:name="id" th:value="${entry.id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="scheduleId" class="form-label">Schedule *</label>
                            <select class="form-select" id="scheduleId" name="scheduleId" required>
                                <option value="">-- Select Schedule --</option>
                                <option th:each="schedule : ${schedules}"
                                        th:value="${schedule.id}"
                                        th:text="'#' + ${schedule.id}"
                                        th:selected="${entry.schedule != null && entry.schedule.id == schedule.id}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="stationId" class="form-label">Station *</label>
                            <select class="form-select" id="stationId" name="stationId" required>
                                <option value="">-- Select Station --</option>
                                <option th:each="station : ${stations}"
                                        th:value="${station.id}"
                                        th:text="${station.name}"
                                        th:selected="${entry.station != null && entry.station.id == station.id}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="arrivalTime" class="form-label">Arrival Time</label>
                            <input type="datetime-local" class="form-control" id="arrivalTime"
                                   name="arrivalTime" th:value="${entry.arrivalTime != null ? #temporals.format(entry.arrivalTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
                            <div class="form-text">Optional arrival time</div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="departureTime" class="form-label">Departure Time</label>
                            <input type="datetime-local" class="form-control" id="departureTime"
                                   name="departureTime" th:value="${entry.departureTime != null ? #temporals.format(entry.departureTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
                            <div class="form-text">Optional departure time</div>
                        </div>
                        <div class="form-text text-danger" id="arrivalTimeError" style="display: none;">
                            Arrival time must be before departure time
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="segmentOrder" class="form-label">Segment Order *</label>
                        <input type="number" class="form-control" id="segmentOrder"
                               name="segmentOrder" th:value="${entry.segmentOrder}" required
                               placeholder="Enter segment order" min="1">
                        <div class="form-text">Order number of this station in the schedule (1, 2, 3, ...)</div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="${returnTo != null} ?
                                    @{'/schedules/' + ${returnTo} + '/edit'} :
                                    '/station-entries'"
                           class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i>
                            <span th:if="${returnTo != null}">Back to Schedule</span>
                            <span th:unless="${returnTo != null}">Cancel</span>
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            <span th:text="${entry.id != null} ? 'Update' : 'Create'">
                                Save
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white mt-auto py-3">
    <div th:insert="~{fragments/footer :: footer}"></div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Валидация времени
    document.addEventListener('DOMContentLoaded', function() {
        const departureInput = document.getElementById('departureTime');
        const arrivalInput = document.getElementById('arrivalTime');
        const arrivalError = document.getElementById('arrivalTimeError');
        const submitButton = document.getElementById('submitButton');

        function validateTimes() {
            const departure = new Date(departureInput.value);
            const arrival = new Date(arrivalInput.value);

            if (departure && arrival && arrival >= departure) {
                arrivalError.style.display = 'block';
                submitButton.disabled = true;
                return false;
            } else {
                arrivalError.style.display = 'none';
                submitButton.disabled = false;
                return true;
            }
        }

        departureInput.addEventListener('change', validateTimes);
        arrivalInput.addEventListener('change', validateTimes);

        // Изначальная валидация
        validateTimes();
    });
</script>
</body>
</html>
